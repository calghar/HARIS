version: 2
updates:
  # Python dependencies
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      # Keep LLM SDK bumps together (they tend to co-release)
      llm-sdks:
        patterns:
          - "anthropic*"
          - "openai*"

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
