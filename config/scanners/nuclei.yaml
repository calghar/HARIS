# Severity mapping: Nuclei severity strings → internal Severity enum
severity_map:
  critical: CRITICAL
  high: HIGH
  medium: MEDIUM
  low: LOW
  info: INFO
  unknown: INFO

# Confidence mapping: Nuclei severity → internal Confidence enum
confidence_map:
  critical: CONFIRMED
  high: CONFIRMED
  medium: FIRM
  low: FIRM
  info: TENTATIVE
  unknown: TENTATIVE

# Generic Nuclei metadata tags (NOT technology names)
# These appear in info.tags and must be excluded from tech extraction
meta_tags:
  - tech
  - waf
  - misc
  - discovery
  - cms
  - detect
  - panel
  - exposure
  - osint
  - recon
  - token
  - cloud
  - network
  - dns
  - fuzz
  - headless
  - file
  - iot

# Default template directories for scanning
# Focused on checks NOT already covered by other HARIS scanners
default_template_dirs:
  - http/cves              # 3830 — known CVE checks (largest, most impactful)
  - http/exposures         # 683 — exposed files, backups, cloud storage, secrets
  - http/exposed-panels    # 1351 — admin panels, CMS logins, management UIs
  - http/vulnerabilities   # 934 — injection, XSS, SSRF beyond Wapiti
  - http/default-logins    # 270 — default credentials (unique to nuclei)
  - http/takeovers         # 74  — subdomain takeover detection
  - http/misconfiguration  # 920 — misconfigs, security headers, CORS, etc.
  - dast                   # 249 — dynamic application security testing

# Template directory for technology fingerprinting (Phase 1)
tech_fingerprint_dir: http/technologies

# Nuclei OWASP tag mapping
# Maps Nuclei template tags/matcher-names to OWASP-aligned tags
# Keys are lowercase substrings; evaluation order matters
tag_map:
  # Injection
  sql:
    - sql_injection
  sqli:
    - sql_injection
  xss:
    - xss
  ssti:
    - ssti
  xxe:
    - xxe
  ssrf:
    - ssrf
  command-injection:
    - command_injection
  rce:
    - command_injection
  code-injection:
    - command_injection
  lfi:
    - directory_traversal
  path-traversal:
    - directory_traversal
  open-redirect:
    - open_redirect
  redirect:
    - open_redirect
  # Authentication / access control
  default-login:
    - default_credentials
  default-credentials:
    - default_credentials
  auth-bypass:
    - broken_authentication
  authentication-bypass:
    - broken_authentication
  login-panel:
    - exposed_panel
  panel:
    - exposed_panel
  admin-panel:
    - exposed_panel
  exposure:
    - sensitive_data_exposure
  disclosure:
    - sensitive_data_exposure
  sensitive:
    - sensitive_data_exposure
  backup:
    - security_misconfiguration
  config:
    - security_misconfiguration
  misconfiguration:
    - security_misconfiguration
  misconfig:
    - security_misconfiguration
  directory-listing:
    - directory_listing
  listing:
    - directory_listing
  # CVE / outdated components
  cve:
    - outdated_component
  cnvd:
    - outdated_component
  edb:
    - outdated_component
  # Headers / TLS / network
  headers:
    - missing_security_headers
  cors:
    - missing_security_headers
  tls:
    - weak_tls
  ssl:
    - weak_tls
  # DNS / cloud
  dns:
    - security_misconfiguration
  takeover:
    - security_misconfiguration
  cloud:
    - security_misconfiguration

