name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC

jobs:
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run Bandit (medium+ severity)
        run: |
          uv run bandit -r src/ -c pyproject.toml -ll -ii \
            --format json --output bandit-report.json || true
          uv run bandit -r src/ -c pyproject.toml -ll -ii

      - name: Upload Bandit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  dependency-audit:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra dev --extra web --extra reporting --extra llm-anthropic --extra llm-openai

      - name: Run pip-audit
        run: |
          uv run pip-audit \
            --ignore-vuln CVE-2026-27205 \
            --ignore-vuln CVE-2026-27448 \
            --ignore-vuln CVE-2026-27459 \
            --ignore-vuln GHSA-78cv-mqj4-43f7 \
            --ignore-vuln CVE-2026-31958 \
            --ignore-vuln CVE-2026-35536 \
            --format=json --output=pip-audit-report.json || true
          uv run pip-audit \
            --ignore-vuln CVE-2026-27205 \
            --ignore-vuln CVE-2026-27448 \
            --ignore-vuln CVE-2026-27459 \
            --ignore-vuln GHSA-78cv-mqj4-43f7 \
            --ignore-vuln CVE-2026-31958 \
            --ignore-vuln CVE-2026-35536

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    # Code scanning requires a public repo or GitHub Advanced Security.
    # continue-on-error keeps this job visible without blocking the workflow.
    continue-on-error: true
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality

      - uses: github/codeql-action/autobuild@v4

      - uses: github/codeql-action/analyze@v4
        with:
          category: python
